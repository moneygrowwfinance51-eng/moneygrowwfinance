<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StarkLoan — Quick Loan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--g:#1a7f4e;--gd:#0f5c37;--gl:#e8f7ef;--bg:#f7f8fa;--bdr:#e3e6ec;--tx:#111827;--mu:#6b7280;--r:9px;
--font-display:'Clash Display',var(--font-body);--font-body:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
html,body{height:100%}
body{font-family:var(--font-body);background:var(--g);color:var(--tx);-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
.icon{width:1em;height:1em;display:inline-block;vertical-align:-0.125em;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.page{min-height:100%;display:flex;flex-direction:column}

nav{background:#fff;padding:14px 20px;display:flex;align-items:center;gap:11px}
.nicon{width:34px;height:34px;background:var(--g);border-radius:9px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.nicon img{width:28px;height:28px;object-fit:contain}
.nname{font-family:var(--font-display);font-size:16px;font-weight:700;letter-spacing:-.02em;color:var(--tx)}

.hero{flex:1;padding:30px 20px 40px;display:flex;flex-direction:column;align-items:center}
.hero-in{width:100%;max-width:420px}

.offer-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.28);border-radius:20px;padding:6px 14px;font-size:12px;color:#fff;font-weight:700;letter-spacing:.02em;margin-bottom:16px}
.offer-chip svg{color:#a7f3d0;flex-shrink:0}

.hero-h{font-family:var(--font-display);font-size:26px;font-weight:700;color:#fff;line-height:1.2;margin-bottom:22px;letter-spacing:-.01em}
.hero-h .accent{color:#a7f3d0}

.card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,.16)}

.field{margin-bottom:12px}
.field label{display:block;font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}

.field-row{border:1.5px solid var(--bdr);border-radius:10px;display:flex;align-items:center;gap:9px;background:#fff;padding:0 12px;transition:.15s}
.field-row:focus-within{border-color:var(--g)}
.field-row svg{color:#9ca3af;flex-shrink:0;font-size:16px}
.field-row input,.field-row select{border:none;outline:none;font-family:inherit;font-size:14px;color:var(--tx);background:transparent;width:100%;padding:12px 0;-webkit-appearance:none;appearance:none}
.field-row select{cursor:pointer}
.field-row.select-row{position:relative}
.field-row.select-row svg.chev{position:absolute;right:12px;pointer-events:none;color:#9ca3af}

.err-msg{font-size:11.5px;color:#b91c1c;margin-top:5px;display:none}
.field.has-err .field-row{border-color:#fca5a5}
.field.has-err .err-msg{display:block}

.cta{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--g);color:#fff;border:none;border-radius:10px;padding:15px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:6px;transition:.15s}
.cta:active{transform:scale(.98)}
.cta:disabled{opacity:.65;cursor:default}
.cta svg{flex-shrink:0}

.fine{font-size:11px;color:#9ca3af;text-align:center;margin-top:12px;line-height:1.5}

.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.cta.loading .spinner{display:inline-block}
.cta.loading .cta-label,.cta.loading .cta-arrow{display:none}
</style>
</head>
<body>

<svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
<defs>
<symbol id="icon-percentage" viewBox="0 0 24 24"><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></symbol>
<symbol id="icon-user" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></symbol>
<symbol id="icon-phone" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.36 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></symbol>
<symbol id="icon-currency-rupee" viewBox="0 0 24 24"><path d="M6 4h11"/><path d="M6 9h11"/><path d="M8 4c4 0 6 2 6 4.5S12 13 8 13"/><path d="M8 13l6 7"/></symbol>
<symbol id="icon-chevron-down" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></symbol>
<symbol id="icon-arrow-right" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></symbol>
</defs>
</svg>

<div class="page">

  <nav>
    <div class="nicon"><img src="logo.png" alt="StarkLoan"></div>
    <div class="nname">StarkLoan</div>
  </nav>

  <div class="hero">
    <div class="hero-in">

      <div class="offer-chip"><svg class="icon"><use href="#icon-percentage"/></svg><span id="badgeText"></span></div>
      <h1 class="hero-h" id="headlineText"></h1>

      <form class="card" id="leadForm" novalidate>

        <div class="field" id="f-name">
          <label>Full Name</label>
          <div class="field-row">
            <svg class="icon"><use href="#icon-user"/></svg>
            <input type="text" id="inName" placeholder="Enter your full name" autocomplete="name">
          </div>
          <div class="err-msg">Please enter your full name.</div>
        </div>

        <div class="field" id="f-phone">
          <label>Mobile Number</label>
          <div class="field-row">
            <svg class="icon"><use href="#icon-phone"/></svg>
            <input type="tel" id="inPhone" placeholder="10-digit mobile number" inputmode="numeric" maxlength="10" autocomplete="tel">
          </div>
          <div class="err-msg">Please enter a valid 10-digit mobile number.</div>
        </div>

        <div class="field" id="f-amount">
          <label>Desired Loan Amount</label>
          <div class="field-row select-row">
            <svg class="icon"><use href="#icon-currency-rupee"/></svg>
            <select id="inAmount"></select>
            <svg class="icon chev"><use href="#icon-chevron-down"/></svg>
          </div>
          <div class="err-msg">Please select a loan amount.</div>
        </div>

        <button type="submit" class="cta" id="ctaBtn">
          <span class="cta-label">Continue</span>
          <svg class="icon cta-arrow"><use href="#icon-arrow-right"/></svg>
          <span class="spinner"></span>
        </button>

        <div class="fine">We'll call you · No spam · No charges</div>
      </form>

    </div>
  </div>

</div>

<script>
// ==========================================
// 🛠️ STARKLOAN AD CAMPAIGN CONFIGURATION
// ==========================================
const LANDING_CONFIG = {
    headline: "Mangalam Fun Square, Durga Nursery Road, Udaipur",
    offerBadge: "₹10 Lakh @ 10% p.a.*",

    // Array of choices for the loan amount dropdown field
    amountOptions: ["₹1L - ₹5L", "₹5L - ₹10L", "₹10L - ₹25L", "₹25L - ₹50L", "₹50L+"],
    defaultSelectedAmount: "₹10L - ₹25L", // Pre-selects this option in the dropdown

    redirectURL: "https://starkloan.in/#apply",
    appsScriptURL: "https://script.google.com/macros/s/AKfycbw2wtzpfWgahjn_n-2XP8J_sMqlZD3jx5fIxHEpvR81EZhxzBkFk1lHNU3-JR3dtfflCw/exec"
};

// Must match API_SECRET in your Apps Script exactly (starkloanAppscript.js).
// Visible in page source — only filters random bots, not a real secret.
const API_SECRET = 'CHANGE_THIS_TO_A_RANDOM_STRING_1234';

// Meta Pixel ID — same pixel used across the main StarkLoan site.
const META_PIXEL_ID = '2041090346480777';

// ── Render config into the DOM ──
document.getElementById('badgeText').textContent = LANDING_CONFIG.offerBadge;

(function renderHeadline(){
  const parts = LANDING_CONFIG.headline.split(',');
  const el = document.getElementById('headlineText');
  if(parts.length > 1){
    el.innerHTML = parts[0] + ',<br><span class="accent">' + parts.slice(1).join(',').trim() + '</span>';
  } else {
    el.textContent = LANDING_CONFIG.headline;
  }
})();

(function renderAmountOptions(){
  const sel = document.getElementById('inAmount');
  sel.innerHTML = '';
  LANDING_CONFIG.amountOptions.forEach(opt=>{
    const o = document.createElement('option');
    o.value = opt;
    o.textContent = opt;
    if(opt === LANDING_CONFIG.defaultSelectedAmount) o.selected = true;
    sel.appendChild(o);
  });
})();

// ── Meta Pixel init ──
!function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
if(META_PIXEL_ID && META_PIXEL_ID.trim()){
  fbq('init', META_PIXEL_ID);
  fbq('track', 'PageView');
}

// ── Phone input: digits only ──
document.getElementById('inPhone').addEventListener('input', function(){
  this.value = this.value.replace(/\D/g,'').slice(0,10);
});

function setError(fieldId, on){
  document.getElementById(fieldId).classList.toggle('has-err', on);
}

function validate(){
  const name = document.getElementById('inName').value.trim();
  const phone = document.getElementById('inPhone').value.trim();
  const amount = document.getElementById('inAmount').value;

  let ok = true;
  if(!name){ setError('f-name', true); ok = false; } else setError('f-name', false);
  if(!/^\d{10}$/.test(phone)){ setError('f-phone', true); ok = false; } else setError('f-phone', false);
  if(!amount){ setError('f-amount', true); ok = false; } else setError('f-amount', false);
  return ok;
}

document.getElementById('leadForm').addEventListener('submit', function(e){
  e.preventDefault();
  if(!validate()) return;

  const name = document.getElementById('inName').value.trim();
  const phone = document.getElementById('inPhone').value.trim();
  const amount = document.getElementById('inAmount').value;

  const ctaBtn = document.getElementById('ctaBtn');
  ctaBtn.disabled = true;
  ctaBtn.classList.add('loading');

  const leadId = Date.now();
  const eventId = 'adlead_' + leadId;

  const lead = {
    name: name,
    phone: phone,
    loanType: 'Personal Loan',
    amount: amount,
    emp: '',
    income: '',
    city: '',
    existingLoan: '',
    status: 'Ad Lead'
  };

  // Send lead to the same Apps Script backend used by the main site
  // (starkloanAppscript.js → action:'createLead').
  const sheetPromise = (LANDING_CONFIG.appsScriptURL && LANDING_CONFIG.appsScriptURL.indexOf('YOUR_') !== 0)
    ? fetch(LANDING_CONFIG.appsScriptURL, {
        method: 'POST',
        headers: {'Content-Type':'text/plain'},
        body: JSON.stringify({action:'createLead', lead:lead, secret:API_SECRET})
      }).catch(()=>{})
    : Promise.resolve();

  // Fire Meta Pixel Lead event (browser-side)
  if(typeof fbq === 'function'){
    fbq('track', 'Lead', {loan_type:'Personal Loan', currency:'INR'}, {eventID:eventId});
  }

  // Fire matching server-side Conversions API event via Apps Script
  // (action:'sendCAPI') — keeps the CAPI access token out of this page.
  if(LANDING_CONFIG.appsScriptURL && LANDING_CONFIG.appsScriptURL.indexOf('YOUR_') !== 0){
    fetch(LANDING_CONFIG.appsScriptURL, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type':'text/plain'},
      body: JSON.stringify({action:'sendCAPI', eventName:'Lead', eventId:eventId, name:name, phone:phone, loanType:'Personal Loan', secret:API_SECRET})
    }).catch(()=>{});
  }

  const minWait = new Promise(res => setTimeout(res, 600));

  Promise.all([sheetPromise, minWait]).then(()=>{
    const params = new URLSearchParams({
      name: name,
      phone: phone,
      amount: amount.replace(/\s+/g,'')
    });
    const sep = LANDING_CONFIG.redirectURL.indexOf('?') > -1 ? '&' : '?';
    window.location.href = LANDING_CONFIG.redirectURL + sep + params.toString();
  });
});
</script>

</body>
</html>
